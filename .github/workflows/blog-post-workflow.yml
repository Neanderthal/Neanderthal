name: Latest blog posts → README

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://neanderthal.github.io/index.xml"
          max_post_count: 5
          template: "- [$title]($url) — <sub>$date</sub>"
          date_format: "yyyy-mm-dd"
          commit_message: "chore: update latest blog posts in README"
